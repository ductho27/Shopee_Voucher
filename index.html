<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Đức Thọ & Affiliate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>🚀 Team Đức Thọ</h1>
            <p>Affiliate Automation Tool</p>
        </div>
        
        <div class="input-group">
            <label for="originUrl">Dán link sản phẩm (Shopee, Lazada, Tiki...)</label>
            <input type="text" id="originUrl" placeholder="https://shopee.vn/ten-san-pham...">
            <button id="generateBtn">TẠO LINK MUA HÀNG</button>
        </div>
        
        <div id="resultArea" class="result-box" style="display: none;">
            <p>Link của bạn đã sẵn sàng:</p>
            <div class="link-display">
                <span id="affLink"></span>
            </div>
            <div class="button-group">
                <button id="copyBtn" class="btn-copy">Sao chép link</button>
                <a id="openBtn" href="#" target="_blank" class="btn-open">Mở link ngay</a>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 Team Đức Thọ & Affiliate</p>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
